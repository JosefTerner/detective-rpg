services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: detective
      POSTGRES_PASSWORD: detective
      POSTGRES_DB: detective
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detective"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: detective
      MONGO_INITDB_ROOT_PASSWORD: detective
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.16.3
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Service Registry ──────────────────────────────────────────────────────

  service-registry:
    build:
      context: .
      dockerfile: service-registry/Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── API Gateway ───────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Domain Services ───────────────────────────────────────────────────────

  case-service:
    build:
      context: .
      dockerfile: case-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/case_db
      SPRING_DATASOURCE_USERNAME: detective
      SPRING_DATASOURCE_PASSWORD: detective
    depends_on:
      service-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy

  player-service:
    build:
      context: .
      dockerfile: player-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/player_db
      SPRING_DATASOURCE_USERNAME: detective
      SPRING_DATASOURCE_PASSWORD: detective
    depends_on:
      service-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy

  time-points-service:
    build:
      context: .
      dockerfile: time-points-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/time_points_db
      SPRING_DATASOURCE_USERNAME: detective
      SPRING_DATASOURCE_PASSWORD: detective
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      service-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  map-service:
    build:
      context: .
      dockerfile: map-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/map_db
      SPRING_DATASOURCE_USERNAME: detective
      SPRING_DATASOURCE_PASSWORD: detective
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      service-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  police-db-service:
    build:
      context: .
      dockerfile: police-db-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/police_db
      SPRING_DATASOURCE_USERNAME: detective
      SPRING_DATASOURCE_PASSWORD: detective
      SPRING_DATA_MONGODB_URI: mongodb://detective:detective@mongo:27017/police_db?authSource=admin
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
    depends_on:
      service-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  postgres-data:
  mongo-data:
  es-data:
  redis-data:
